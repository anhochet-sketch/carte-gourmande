<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>Carte Gourmande — Les spécialités gastronomiques de France</title>
<meta name="description" content="Découvrez les spécialités gastronomiques de France géolocalisées. Calisson d'Aix, nougat de Montélimar, kouign-amann breton, cannelé bordelais et 140+ autres trésors du terroir français. Où les acheter, leur histoire, leur recette.">
<meta name="keywords" content="spécialités gastronomiques France, terroir français, carte gourmande, produits régionaux, où acheter">
<meta property="og:title" content="Carte Gourmande — Les spécialités gastronomiques de France">
<meta property="og:description" content="148 trésors du terroir français géolocalisés. Histoire, producteurs authentiques, conseils de dégustation.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{
  --terre:#8b3a2c;
  --terre-fonce:#5c2419;
  --ocre:#c89651;
  --ocre-clair:#e9c585;
  --olive:#4a5a3a;
  --creme:#f7f1e3;
  --creme-fonce:#ede4cc;
  --encre:#1f1a14;
  --gris:#6e6557;
  --blanc:#fdfaf3;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}

body{
  font-family:'Inter',sans-serif;
  background:var(--blanc);
  color:var(--encre);
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}

/* ─── HEADER ─── */
.header{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:var(--blanc);
  border-bottom:1px solid rgba(31,26,20,.08);
  padding:0.7rem 1rem;
  display:flex;align-items:center;justify-content:space-between;
  gap:0.75rem;
}
.logo{
  font-family:'Fraunces',serif;
  font-weight:700;
  font-size:1.25rem;
  font-style:italic;
  letter-spacing:-0.02em;
  color:var(--terre-fonce);
  display:flex;align-items:center;gap:0.4rem;
  text-decoration:none;
}
.logo::before{
  content:"";
  width:8px;height:8px;
  background:var(--terre);
  border-radius:50%;
  display:inline-block;
}
.count{
  font-family:'Inter',sans-serif;
  font-size:0.7rem;
  color:var(--gris);
  font-weight:500;
  letter-spacing:0.04em;
  text-transform:uppercase;
}

/* ─── FILTERS ─── */
.filters{
  position:fixed;top:55px;left:0;right:0;z-index:999;
  background:var(--creme);
  padding:0.6rem 0.75rem;
  display:flex;gap:0.4rem;
  overflow-x:auto;
  scrollbar-width:none;
  border-bottom:1px solid rgba(31,26,20,.06);
}
.filters::-webkit-scrollbar{display:none;}

.chip{
  flex-shrink:0;
  padding:0.45rem 0.85rem;
  background:var(--blanc);
  border:1px solid rgba(31,26,20,.12);
  border-radius:999px;
  font-size:0.78rem;
  font-weight:500;
  color:var(--encre);
  cursor:pointer;
  transition:all 0.2s ease;
  white-space:nowrap;
  display:flex;align-items:center;gap:0.3rem;
}
.chip:active{transform:scale(0.97);}
.chip.active{
  background:var(--encre);
  color:var(--creme);
  border-color:var(--encre);
}
.chip-sale.active{background:var(--olive);border-color:var(--olive);}
.chip-sucre.active{background:var(--terre);border-color:var(--terre);}

.chip-geo{
  background:var(--ocre);
  color:var(--encre);
  border-color:var(--ocre);
  font-weight:600;
}
.chip-geo.active{background:var(--terre-fonce);color:var(--blanc);border-color:var(--terre-fonce);}

/* ─── MAP ─── */
#map{
  position:absolute;
  top:108px;bottom:0;left:0;right:0;
}

/* Pin custom */
.pin{
  display:flex;align-items:center;justify-content:center;
  width:38px;height:38px;
  border-radius:50% 50% 50% 0;
  background:var(--terre);
  border:3px solid var(--blanc);
  transform:rotate(-45deg);
  box-shadow:0 4px 16px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:all 0.2s;
}
.pin span{
  transform:rotate(45deg);
  font-size:18px;
  line-height:1;
}
.pin-sucre{background:var(--terre);}
.pin-sale{background:var(--olive);}
.pin:hover{transform:rotate(-45deg) scale(1.15);}

/* ─── BOTTOM SHEET ─── */
.sheet{
  position:fixed;
  bottom:0;left:0;right:0;
  background:var(--blanc);
  border-radius:24px 24px 0 0;
  box-shadow:0 -20px 60px rgba(0,0,0,0.25);
  z-index:2000;
  max-height:85vh;
  transform:translateY(100%);
  transition:transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.sheet.open{transform:translateY(0);}
.sheet-handle{
  width:40px;height:4px;
  background:rgba(31,26,20,0.2);
  border-radius:2px;
  margin:10px auto 0;
}
.sheet-close{
  position:absolute;top:14px;right:16px;
  width:34px;height:34px;
  background:var(--creme);
  border:none;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  font-size:18px;
  color:var(--encre);
  z-index:10;
}

.sheet-image{
  width:100%;
  height:240px;
  object-fit:cover;
  display:block;
  background:var(--creme);
}

.sheet-body{padding:1.2rem 1.3rem 2rem;}

.sheet-region{
  font-family:'Inter',sans-serif;
  font-size:0.7rem;
  font-weight:600;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--terre);
  margin-bottom:0.3rem;
}
.sheet-region::before{content:"📍 ";}

.sheet-title{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:1.65rem;
  line-height:1.15;
  letter-spacing:-0.02em;
  color:var(--encre);
  margin-bottom:0.8rem;
}

.sheet-type-tag{
  display:inline-block;
  font-size:0.7rem;
  font-weight:600;
  letter-spacing:0.08em;
  text-transform:uppercase;
  padding:0.2rem 0.6rem;
  border-radius:4px;
  margin-bottom:1rem;
}
.tag-sucre{background:#fde9d6;color:var(--terre-fonce);}
.tag-sale{background:#e3e8d8;color:#2c3823;}

.sheet-description{
  font-size:0.95rem;
  line-height:1.65;
  color:var(--encre);
  margin-bottom:1.4rem;
}

.sheet-actions{
  display:flex;flex-direction:column;gap:0.5rem;
  margin-top:1.2rem;
}

.btn{
  display:flex;align-items:center;justify-content:center;
  gap:0.5rem;
  padding:0.85rem 1rem;
  border-radius:12px;
  font-family:'Inter',sans-serif;
  font-size:0.92rem;
  font-weight:600;
  text-decoration:none;
  border:none;
  cursor:pointer;
  transition:all 0.2s;
}
.btn:active{transform:scale(0.97);}
.btn-primary{
  background:var(--encre);
  color:var(--creme);
}
.btn-primary:hover{background:var(--terre-fonce);}

/* ─── SPLASH ─── */
.splash{
  position:fixed;inset:0;
  background:var(--blanc);
  z-index:9999;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  gap:0.5rem;
  transition:opacity 0.4s ease;
}
.splash.hide{opacity:0;pointer-events:none;}
.splash-logo{
  font-family:'Fraunces',serif;
  font-style:italic;
  font-weight:700;
  font-size:2.2rem;
  color:var(--terre-fonce);
  letter-spacing:-0.03em;
}
.splash-sub{
  font-size:0.8rem;
  color:var(--gris);
  letter-spacing:0.05em;
  text-transform:uppercase;
}

/* ─── DISCLAIMER FOOTER ─── */
.disclaimer{
  position:fixed;bottom:8px;left:8px;right:8px;
  background:rgba(31,26,20,0.85);
  color:var(--creme);
  font-size:0.65rem;
  padding:0.4rem 0.7rem;
  border-radius:8px;
  text-align:center;
  z-index:500;
  backdrop-filter:blur(8px);
  pointer-events:none;
}

/* Leaflet popup override */
.leaflet-popup-content-wrapper{
  border-radius:14px;
  font-family:'Inter',sans-serif;
  padding:2px;
}
.leaflet-popup-content{
  margin:10px 14px;
  font-size:0.85rem;
  font-weight:500;
}
.leaflet-popup-tip{background:#fff;}

@media(min-width:700px){
  .sheet{
    max-width:480px;
    left:50%;
    transform:translate(-50%, 100%);
  }
  .sheet.open{transform:translate(-50%, 0);}
}
</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="splash-logo">Carte Gourmande</div>
  <div class="splash-sub">Les trésors du terroir français</div>
</div>

<header class="header">
  <a href="/" class="logo">Carte Gourmande</a>
  <span class="count" id="count">— chargement —</span>
</header>

<div class="filters" id="filters">
  <button class="chip chip-geo" id="geoBtn">📍 Autour de moi</button>
  <button class="chip active" data-filter="all">Tout</button>
  <button class="chip chip-sucre" data-filter="sucré">🍯 Sucré</button>
  <button class="chip chip-sale" data-filter="salé">🥨 Salé</button>
</div>

<div id="map"></div>

<div class="disclaimer">Liens d'affiliation Amazon — En tant que Partenaire Amazon, je perçois un revenu sur les achats éligibles.</div>

<!-- BOTTOM SHEET -->
<div class="sheet" id="sheet" role="dialog" aria-modal="true">
  <div class="sheet-handle"></div>
  <button class="sheet-close" id="sheetClose" aria-label="Fermer">✕</button>
  <img class="sheet-image" id="sheetImage" alt="">
  <div class="sheet-body">
    <div class="sheet-region" id="sheetRegion"></div>
    <h2 class="sheet-title" id="sheetTitle"></h2>
    <span class="sheet-type-tag" id="sheetTypeTag"></span>
    <p class="sheet-description" id="sheetDesc"></p>
    <div class="sheet-actions" id="sheetActions"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
// ─── INIT MAP ───
const map = L.map('map', {
  zoomControl: true,
  preferCanvas: true
}).setView([46.7, 2.3], 6);

// Fond Stadia Alidade Smooth — clean, beige clair, labels en français
L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth/{z}/{x}/{y}{r}.png?lang=fr', {
  attribution: '© Stadia Maps © OpenStreetMap',
  maxZoom: 18,
  minZoom: 5
}).addTo(map);

// Force le z-index correct
map.getContainer().style.zIndex = '1';

// ─── STATE ───
let currentFilter = 'all';
let allMarkers = [];
const data = window.FULL_DATA || [];

// ─── BUILD MARKERS ───
function buildMarkers(){
  // Remove existing
  allMarkers.forEach(m => map.removeLayer(m));
  allMarkers = [];

  const filtered = currentFilter === 'all'
    ? data
    : data.filter(d => d.type === currentFilter);

  filtered.forEach(item => {
    const emoji = item.type === 'sucré' ? '🍯' : item.type === 'salé' ? '🥨' : '🍴';
    const klass = item.type === 'sucré' ? 'pin-sucre' : 'pin-sale';

    const icon = L.divIcon({
      className: '',
      html: `<div class="pin ${klass}"><span>${emoji}</span></div>`,
      iconSize: [38, 38],
      iconAnchor: [19, 38],
      popupAnchor: [0, -34]
    });

    const marker = L.marker([item.latitude, item.longitude], { icon })
      .addTo(map)
      .bindPopup(`<strong>${item.name}</strong><br><small>Voir détails →</small>`, {
        closeButton: false,
        offset: [0, -8]
      });

    marker.on('click', () => openSheet(item));
    allMarkers.push(marker);
  });

  document.getElementById('count').textContent = `${filtered.length} spécialités`;
}

// ─── BOTTOM SHEET ───
const sheet = document.getElementById('sheet');
const sheetClose = document.getElementById('sheetClose');

function openSheet(item){
  document.getElementById('sheetImage').src = item.image;
  document.getElementById('sheetImage').alt = item.name;
  document.getElementById('sheetRegion').textContent = item.region || '';
  document.getElementById('sheetTitle').textContent = item.name;

  const typeTag = document.getElementById('sheetTypeTag');
  if(item.type === 'sucré'){
    typeTag.textContent = '🍯 Sucré';
    typeTag.className = 'sheet-type-tag tag-sucre';
  } else if(item.type === 'salé'){
    typeTag.textContent = '🥨 Salé';
    typeTag.className = 'sheet-type-tag tag-sale';
  } else {
    typeTag.style.display = 'none';
  }

  document.getElementById('sheetDesc').textContent = item.description;

  const actions = document.getElementById('sheetActions');
  actions.innerHTML = '';
  (item.links || []).forEach(link => {
    const a = document.createElement('a');
    a.href = link.url;
    a.target = '_blank';
    a.rel = 'sponsored noopener';
    a.className = 'btn btn-primary';
    a.innerHTML = link.text === 'Amazon'
      ? `🛒 Commander sur ${link.text}`
      : `🛒 ${link.text}`;
    actions.appendChild(a);
  });

  sheet.classList.add('open');
}

function closeSheet(){
  sheet.classList.remove('open');
}

sheetClose.addEventListener('click', closeSheet);
sheet.addEventListener('click', (e) => {
  if(e.target === sheet) closeSheet();
});

// Swipe down to close
let touchStartY = 0;
sheet.addEventListener('touchstart', (e) => {
  if(sheet.scrollTop === 0){
    touchStartY = e.touches[0].clientY;
  }
});
sheet.addEventListener('touchmove', (e) => {
  if(sheet.scrollTop > 0) return;
  const dy = e.touches[0].clientY - touchStartY;
  if(dy > 80){
    closeSheet();
    touchStartY = 0;
  }
});

// ─── FILTERS ───
document.querySelectorAll('.chip[data-filter]').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip[data-filter]').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    buildMarkers();
  });
});

// ─── GEOLOCATION ───
const geoBtn = document.getElementById('geoBtn');
let userMarker = null;

geoBtn.addEventListener('click', () => {
  if(!navigator.geolocation){
    alert('La géolocalisation n\'est pas disponible sur ce navigateur.');
    return;
  }
  geoBtn.textContent = '📍 Localisation…';
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { latitude, longitude } = pos.coords;
      map.flyTo([latitude, longitude], 10, { duration: 1.2 });
      if(userMarker) map.removeLayer(userMarker);
      userMarker = L.circleMarker([latitude, longitude], {
        radius: 9,
        fillColor: '#3b82f6',
        color: '#fff',
        weight: 3,
        fillOpacity: 1
      }).addTo(map).bindPopup('Vous êtes ici');
      geoBtn.textContent = '📍 Autour de moi';
      geoBtn.classList.add('active');
    },
    (err) => {
      geoBtn.textContent = '📍 Autour de moi';
      alert('Impossible de récupérer votre position. Avez-vous autorisé la géolocalisation ?');
    },
    { enableHighAccuracy: true, timeout: 8000 }
  );
});

// ─── INIT ───
buildMarkers();
setTimeout(() => {
  document.getElementById('splash').classList.add('hide');
}, 600);
</script>
</body>
</html>
