<style>
:root{
  --terre:#8b3a2c;
  --terre-fonce:#5c2419;
  --ocre:#c89651;
  --ocre-clair:#e9c585;
  --olive:#4a5a3a;
  --creme:#f7f1e3;
  --creme-fonce:#ede4cc;
  --encre:#1f1a14;
  --gris:#6e6557;
  --blanc:#fdfaf3;
  /* Couleurs par catégorie */
  --cat-fromage:#e8b95a;
  --cat-charcuterie:#8b3a2c;
  --cat-patisserie:#d88a9e;
  --cat-confiserie:#c89651;
  --cat-biscuiterie:#b88a52;
  --cat-vins:#722f37;
  --cat-epicerie:#4a5a3a;
  --cat-mer:#2c5a8b;
  --cat-viande:#a14536;
  --cat-legume:#6b8e3d;
  --cat-pain:#d6a85c;
  --cat-plat:#9c6b3f;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}

body{
  font-family:'Inter',sans-serif;
  background:var(--blanc);
  color:var(--encre);
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}

/* ─── HEADER ─── */
.header{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:var(--blanc);
  border-bottom:1px solid rgba(31,26,20,.08);
  padding:0.7rem 1rem;
  display:flex;align-items:center;justify-content:space-between;
  gap:0.75rem;
}
.logo{
  font-family:'Fraunces',serif;
  font-weight:700;
  font-size:1.25rem;
  font-style:italic;
  letter-spacing:-0.02em;
  color:var(--terre-fonce);
  display:flex;align-items:center;gap:0.4rem;
  text-decoration:none;
}
.logo::before{
  content:"";
  width:8px;height:8px;
  background:var(--terre);
  border-radius:50%;
  display:inline-block;
}
.count{
  font-family:'Inter',sans-serif;
  font-size:0.7rem;
  color:var(--gris);
  font-weight:500;
  letter-spacing:0.04em;
  text-transform:uppercase;
}
.header-right{display:flex;align-items:center;gap:0.6rem;}
.nav-guides{
  font-family:'Inter',sans-serif;font-size:0.72rem;font-weight:600;
  color:var(--terre-fonce);text-decoration:none;white-space:nowrap;
  background:var(--creme);border:1px solid var(--creme-fonce);
  padding:0.32rem 0.65rem;border-radius:999px;
}
.nav-guides:hover{background:var(--creme-fonce);}
@media(max-width:520px){.count{display:none;}}

/* ─── FILTERS ─── */
.filters{
  position:fixed;top:55px;left:0;right:0;z-index:999;
  background:var(--creme);
  padding:0.6rem 0.75rem;
  display:flex;gap:0.4rem;
  overflow-x:auto;
  scrollbar-width:none;
  border-bottom:1px solid rgba(31,26,20,.06);
}
.filters::-webkit-scrollbar{display:none;}

.chip{
  flex-shrink:0;
  padding:0.45rem 0.85rem;
  background:var(--blanc);
  border:1px solid rgba(31,26,20,.12);
  border-radius:999px;
  font-size:0.78rem;
  font-weight:500;
  color:var(--encre);
  cursor:pointer;
  transition:all 0.2s ease;
  white-space:nowrap;
  display:flex;align-items:center;gap:0.3rem;
}
.chip:active{transform:scale(0.97);}
.chip.active{
  background:var(--encre);
  color:var(--creme);
  border-color:var(--encre);
}

/* Chips colorés par catégorie quand actifs */
.chip[data-filter="fromage"].active{background:var(--cat-fromage);color:var(--encre);border-color:var(--cat-fromage);}
.chip[data-filter="charcuterie"].active{background:var(--cat-charcuterie);color:var(--blanc);border-color:var(--cat-charcuterie);}
.chip[data-filter="pâtisserie"].active{background:var(--cat-patisserie);color:var(--encre);border-color:var(--cat-patisserie);}
.chip[data-filter="confiserie"].active{background:var(--cat-confiserie);color:var(--blanc);border-color:var(--cat-confiserie);}
.chip[data-filter="biscuiterie"].active{background:var(--cat-biscuiterie);color:var(--blanc);border-color:var(--cat-biscuiterie);}
.chip[data-filter="vins"].active{background:var(--cat-vins);color:var(--blanc);border-color:var(--cat-vins);}
.chip[data-filter="épicerie"].active{background:var(--cat-epicerie);color:var(--blanc);border-color:var(--cat-epicerie);}
.chip[data-filter="mer"].active{background:var(--cat-mer);color:var(--blanc);border-color:var(--cat-mer);}
.chip[data-filter="viande"].active{background:var(--cat-viande);color:var(--blanc);border-color:var(--cat-viande);}
.chip[data-filter="legume"].active{background:var(--cat-legume);color:var(--blanc);border-color:var(--cat-legume);}
.chip[data-filter="pain"].active{background:var(--cat-pain);color:var(--encre);border-color:var(--cat-pain);}
.chip[data-filter="plat"].active{background:var(--cat-plat);color:var(--blanc);border-color:var(--cat-plat);}

.chip-geo{
  background:var(--ocre);
  color:var(--encre);
  border-color:var(--ocre);
  font-weight:600;
}
.chip-geo.active{background:var(--terre-fonce);color:var(--blanc);border-color:var(--terre-fonce);}

/* ─── MAP ─── */
#map{
  position:absolute;
  top:108px;bottom:0;left:0;right:0;
}

/* Pin : icône seule, sans bulle */
.pin{
  display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;
  cursor:pointer;
  transition:transform 0.2s ease;
}
.pin span{
  font-size:27px;
  line-height:1;
  /* halo discret pour détacher l'émoji du fond clair de la carte */
  filter:drop-shadow(0 1px 1.5px rgba(0,0,0,0.45)) drop-shadow(0 0 2px rgba(255,255,255,0.95));
}
.pin:hover{transform:scale(1.2);}

/* ─── BOTTOM SHEET ─── */
.sheet{
  position:fixed;
  bottom:0;left:0;right:0;
  background:var(--blanc);
  border-radius:24px 24px 0 0;
  box-shadow:0 -20px 60px rgba(0,0,0,0.25);
  z-index:2000;
  max-height:85vh;
  transform:translateY(100%);
  transition:transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.sheet.open{transform:translateY(0);}
.sheet-handle{
  width:40px;height:4px;
  background:rgba(31,26,20,0.2);
  border-radius:2px;
  margin:10px auto 0;
}
.sheet-close{
  position:absolute;top:14px;right:16px;
  width:34px;height:34px;
  background:var(--creme);
  border:none;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  font-size:18px;
  color:var(--encre);
  z-index:10;
}

.sheet-image{
  width:100%;
  height:240px;
  object-fit:cover;
  display:block;
  background:var(--creme);
}

.sheet-body{padding:1.2rem 1.3rem 2rem;}

.sheet-region{
  font-family:'Inter',sans-serif;
  font-size:0.7rem;
  font-weight:600;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--terre);
  margin-bottom:0.3rem;
}
.sheet-region::before{content:"📍 ";}

.sheet-title{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:1.65rem;
  line-height:1.15;
  letter-spacing:-0.02em;
  color:var(--encre);
  margin-bottom:0.8rem;
}

.sheet-cat-tag{
  display:inline-block;
  font-size:0.7rem;
  font-weight:600;
  letter-spacing:0.08em;
  text-transform:uppercase;
  padding:0.25rem 0.7rem;
  border-radius:4px;
  margin-bottom:1rem;
  color:var(--blanc);
}
.tag-fromage{background:var(--cat-fromage);color:var(--encre);}
.tag-charcuterie{background:var(--cat-charcuterie);}
.tag-pâtisserie{background:var(--cat-patisserie);color:var(--encre);}
.tag-confiserie{background:var(--cat-confiserie);}
.tag-biscuiterie{background:var(--cat-biscuiterie);}
.tag-vins{background:var(--cat-vins);}
.tag-épicerie{background:var(--cat-epicerie);}
.tag-mer{background:var(--cat-mer);}
.tag-viande{background:var(--cat-viande);}
.tag-legume{background:var(--cat-legume);}
.tag-pain{background:var(--cat-pain);color:var(--encre);}
.tag-plat{background:var(--cat-plat);}

.sheet-region-tag{
  display:inline-block;
  font-size:0.7rem;
  font-weight:600;
  letter-spacing:0.04em;
  padding:0.25rem 0.7rem;
  border-radius:4px;
  margin:0 0 1rem 0.4rem;
  color:var(--terre-fonce);
  background:var(--creme-fonce);
  text-decoration:none;
  cursor:pointer;
  transition:background .15s ease;
}
.sheet-region-tag:hover{background:var(--ocre-clair);}
.sheet-region-tag::after{content:" →";}

.sheet-description{
  font-size:0.98rem;
  line-height:1.6;
  color:var(--encre);
  font-weight:500;
  margin-bottom:0.8rem;
}
.sheet-detail{
  font-size:0.92rem;
  line-height:1.7;
  color:var(--gris);
  margin-bottom:1.2rem;
  white-space:pre-line;
}
.sheet-detail:empty{display:none;}
.sheet-video{
  position:relative;width:100%;aspect-ratio:16/9;
  border-radius:12px;overflow:hidden;margin-bottom:1.2rem;background:var(--creme-fonce);
}
.sheet-video:empty{display:none;}
.sheet-video iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}

.sheet-actions{
  display:flex;flex-direction:column;gap:0.5rem;
  margin-top:1.2rem;
}

.btn{
  display:flex;align-items:center;justify-content:center;
  gap:0.5rem;
  padding:0.85rem 1rem;
  border-radius:12px;
  font-family:'Inter',sans-serif;
  font-size:0.92rem;
  font-weight:600;
  text-decoration:none;
  border:none;
  cursor:pointer;
  transition:all 0.2s;
}
.btn:active{transform:scale(0.97);}
.btn-primary{
  background:var(--encre);
  color:var(--creme);
}
.btn-primary:hover{background:var(--terre-fonce);}

/* ─── SPLASH ─── */
.splash{
  position:fixed;inset:0;
  background:var(--blanc);
  z-index:9999;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  gap:0.5rem;
  transition:opacity 0.4s ease;
}
.splash.hide{opacity:0;pointer-events:none;}
.splash-logo{
  font-family:'Fraunces',serif;
  font-style:italic;
  font-weight:700;
  font-size:2.2rem;
  color:var(--terre-fonce);
  letter-spacing:-0.03em;
}
.splash-sub{
  font-size:0.8rem;
  color:var(--gris);
  letter-spacing:0.05em;
  text-transform:uppercase;
}

/* ─── DISCLAIMER FOOTER ─── */
.disclaimer{
  position:fixed;bottom:8px;left:8px;right:8px;
  background:rgba(31,26,20,0.85);
  color:var(--creme);
  font-size:0.35rem;
  padding:0.2rem 0.5rem;
  border-radius:8px;
  text-align:center;
  z-index:500;
  backdrop-filter:blur(8px);
  pointer-events:none;
}

/* Leaflet popup override */
.leaflet-popup-content-wrapper{
  border-radius:14px;
  font-family:'Inter',sans-serif;
  padding:2px;
}
.leaflet-popup-content{
  margin:10px 14px;
  font-size:0.85rem;
  font-weight:500;
}
.leaflet-popup-tip{background:#fff;}

@media(min-width:700px){
  .sheet{
    max-width:480px;
    left:50%;
    transform:translate(-50%, 100%);
  }
  .sheet.open{transform:translate(-50%, 0);}
}
</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="splash-logo">Carte Gourmande</div>
  <div class="splash-sub">Les trésors du terroir français</div>
</div>

<header class="header">
  <a href="/" class="logo">Carte Gourmande</a>

</header>

<div class="filters" id="filters">

</div>

<div id="map"></div>

<div class="disclaimer">Liens d'affiliation — Je perçois une commission sur certains achats éligibles, sans surcoût pour vous.</div>

<!-- BOTTOM SHEET -->
<div class="sheet" id="sheet" role="dialog" aria-modal="true">
  <div class="sheet-handle"></div>
  <button class="sheet-close" id="sheetClose" aria-label="Fermer">✕</button>

    <span class="sheet-cat-tag" id="sheetCatTag"></span>
    <a class="sheet-region-tag" id="sheetRegionTag"></a>
    <p class="sheet-description" id="sheetDesc"></p>
    <p class="sheet-detail" id="sheetDetail"></p>
    <div class="sheet-video" id="sheetVideo"></div>
    <div class="sheet-actions" id="sheetActions"></div>
  </div>
</div>

<script src="data.js"></script>
<script>

const CATEGORIES = {

// ─── INIT MAP ───
const map = L.map('map', {
  zoomControl: true,
  preferCanvas: true
}).setView([46.7, 2.3], 6);

// Fond Stadia Outdoors — coloré (verts, ocres), net, routes et libellés en français
L.tileLayer('https://tiles.stadiamaps.com/tiles/outdoors/{z}/{x}/{y}{r}.png?lang=fr', {
  attribution: '© Stadia Maps © OpenStreetMap',
  maxZoom: 18,
  minZoom: 5
}).addTo(map);

// Force le z-index correct
map.getContainer().style.zIndex = '1';

// ─── STATE ───
let currentFilter = 'all';
let allMarkers = [];
const data = window.FULL_DATA || [];

// ─── BUILD MARKERS ───
function buildMarkers(){
  // Remove existing
  allMarkers.forEach(m => map.removeLayer(m));
  allMarkers = [];

  const filtered = currentFilter === 'all'
    ? data
    : data.filter(d => d.category === currentFilter);

  filtered.forEach(item => {
    const cat = CATEGORIES[item.category] || { emoji: '🍴', label: 'Autre' };
    const emoji = cat.emoji;

    const icon = L.divIcon({
      className: '',
      html: `<div class="pin"><span>${emoji}</span></div>`,
      iconSize: [34, 34],
      iconAnchor: [17, 17],
      popupAnchor: [0, -16]
    });

    const marker = L.marker([item.latitude, item.longitude], { icon })
      .addTo(map)
      .bindPopup(`<strong>${item.name}</strong><br><small>Voir détails →</small>`, {
        closeButton: false,
        offset: [0, -8]
      });

    marker.on('click', () => openSheet(item));
    allMarkers.push(marker);
  });

  document.getElementById('count').textContent = `${filtered.length} spécialités`;
}

// ─── BOTTOM SHEET ───
const sheet = document.getElementById('sheet');
const sheetClose = document.getElementById('sheetClose');

function openSheet(item){
  document.getElementById('sheetImage').src = item.image;
  document.getElementById('sheetImage').alt = item.name;
  const _terroir = (item.terroir && item.terroir !== item.region) ? ' · ' + item.terroir : '';
  document.getElementById('sheetRegion').textContent = (item.region || '') + _terroir;
  document.getElementById('sheetTitle').textContent = item.name;

  // Tag catégorie
  const catTag = document.getElementById('sheetCatTag');
  const cat = CATEGORIES[item.category];
  if(cat){
    catTag.textContent = `${cat.emoji} ${cat.label}`;
    catTag.className = `sheet-cat-tag tag-${item.category}`;
    catTag.style.display = 'inline-block';
  } else {
    catTag.style.display = 'none';
  }

  // Badge région cliquable → guide régional
  const regionTag = document.getElementById('sheetRegionTag');
  const guide = REGION_GUIDE[item.region];
  if(guide){
    regionTag.textContent = guide.label;
    regionTag.href = guide.slug;
    regionTag.style.display = 'inline-block';
  } else {
    regionTag.style.display = 'none';
  }

  document.getElementById('sheetDesc').textContent = item.description || '';
  document.getElementById('sheetDetail').textContent = item.detail || '';

  // Vidéo (accepte une URL YouTube complète ou un identifiant)
  const videoBox = document.getElementById('sheetVideo');
  videoBox.innerHTML = '';
  if(item.video){
    let id = item.video;
    const m = String(item.video).match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);
    if(m) id = m[1];
    videoBox.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}" title="Vidéo" allow="encrypted-media; picture-in-picture" allowfullscreen loading="lazy"></iframe>`;
  }

  const actions = document.getElementById('sheetActions');
  actions.innerHTML = '';
  (item.links || []).forEach(link => {
    const a = document.createElement('a');
    a.href = link.url;
    a.target = '_blank';
    a.rel = 'sponsored noopener';
    a.className = 'btn btn-primary';
    a.innerHTML = `🛒 ${link.text}`;
    actions.appendChild(a);
  });

  sheet.classList.add('open');
}

function closeSheet(){
  sheet.classList.remove('open');
}

sheetClose.addEventListener('click', closeSheet);
sheet.addEventListener('click', (e) => {
  if(e.target === sheet) closeSheet();
});

// Swipe down to close
let touchStartY = 0;
sheet.addEventListener('touchstart', (e) => {
  if(sheet.scrollTop === 0){
    touchStartY = e.touches[0].clientY;
  }
});
sheet.addEventListener('touchmove', (e) => {
  if(sheet.scrollTop > 0) return;
  const dy = e.touches[0].clientY - touchStartY;
  if(dy > 80){
    closeSheet();
    touchStartY = 0;
  }
});

// ─── FILTERS ───
document.querySelectorAll('.chip[data-filter]').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip[data-filter]').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    buildMarkers();
  });
});

// ─── GEOLOCATION ───
const geoBtn = document.getElementById('geoBtn');
let userMarker = null;

geoBtn.addEventListener('click', () => {
  if(!navigator.geolocation){
    alert('La géolocalisation n\'est pas disponible sur ce navigateur.');
    return;
  }
  geoBtn.textContent = '📍 Localisation…';
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { latitude, longitude } = pos.coords;
      map.flyTo([latitude, longitude], 10, { duration: 1.2 });
      if(userMarker) map.removeLayer(userMarker);
      userMarker = L.circleMarker([latitude, longitude], {
        radius: 9,
        fillColor: '#3b82f6',
        color: '#fff',
        weight: 3,
        fillOpacity: 1
      }).addTo(map).bindPopup('Vous êtes ici');
      geoBtn.textContent = '📍 Autour de moi';
      geoBtn.classList.add('active');
    },
    (err) => {
      geoBtn.textContent = '📍 Autour de moi';
      alert('Impossible de récupérer votre position. Avez-vous autorisé la géolocalisation ?');
    },
    { enableHighAccuracy: true, timeout: 8000 }
  );
});

// ─── INIT ───
buildMarkers();

// ─── DEEP-LINK depuis les guides : index.html?f=identifiant ouvre la fiche ───
(function(){
  const fid = new URLSearchParams(window.location.search).get('f');
  if(!fid) return;
  const item = data.find(d => d.id === fid);
  if(!item) return;
  map.setView([item.latitude, item.longitude], 11);
  setTimeout(() => openSheet(item), 450);
})();

setTimeout(() => {
  document.getElementById('splash').classList.add('hide');
}, 600);
</script>
</body>
</html>
